<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="Registro.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Raleway&display=swap" rel="stylesheet">
    <title>Inicio de Sesión</title>
</head>

<body>

<nav class="navbar">
    <a href="Inicio.html" class="sesion nav-left">BetGol ⚽</a>
    <a href="Registro.html" class="sesion nav-right">Registrarse</a>
</nav>

<hr>

<div class="registro-container">
    <div class="registro-box">

        <h2 class="titulo-registro">Inicio de Sesión</h2>

        <div id="alerta" style="display:none; padding:10px; border-radius:8px; margin-bottom:16px; font-size:13px; font-weight:600;"></div>

        <div class="mb-3">
            <label class="form-label label-registro">Correo electrónico</label>
            <input type="email" id="email" class="form-control" placeholder="Ingrese su correo">
        </div>

        <div class="mb-3">
            <label class="form-label label-registro">Contraseña</label>
            <input type="password" id="password" class="form-control" placeholder="Ingrese su contraseña">
        </div>

        <div class="d-grid">
            <button id="btnLogin" class="btn btn-outline-success w-100" style="color:white" onclick="login()">
                Iniciar Sesión
            </button>
        </div>

        <p class="text-center mt-3" style="color:white; font-size:13px;">
            ¿No tienes cuenta? <a href="Registro.html" style="color:#a8e6af;">Regístrate</a>
        </p>

    </div>
</div>

<script>
    const API = window.location.origin;

    async function login() {
        const email    = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btn      = document.getElementById('btnLogin');

        if (!email || !password) {
            mostrarAlerta('Completa todos los campos', '#ffe0e0', '#c00');
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Entrando...';

        try {
            const res = await fetch(`${API}/api/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            const data = await res.json();

            if (!res.ok) {
                mostrarAlerta(data.error || 'Credenciales incorrectas', '#ffe0e0', '#c00');
                btn.disabled = false;
                btn.textContent = 'Iniciar Sesión';
                return;
            }

            localStorage.setItem('token', data.token);
            localStorage.setItem('user', JSON.stringify(data.user));

            mostrarAlerta('¡Bienvenido! Redirigiendo...', '#e0ffe8', '#1a6b2e');
            setTimeout(() => window.location.href = 'Chat.html', 1200);

        } catch (e) {
            mostrarAlerta('No se pudo conectar al servidor', '#ffe0e0', '#c00');
            btn.disabled = false;
            btn.textContent = 'Iniciar Sesión';
        }
    }

    function mostrarAlerta(msg, bg, color) {
        const el = document.getElementById('alerta');
        el.textContent = msg;
        el.style.background = bg;
        el.style.color = color;
        el.style.display = 'block';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
</script>

</body>
</html>
